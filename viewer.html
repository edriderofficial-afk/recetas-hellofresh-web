<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>Visor PDF</title>
  <style>
    :root{--bg:#0f172a;--surface:#111827;--text:#fff;--muted:#cbd5e1;--accent:#16a34a}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text)}
    header{position:sticky;top:0;z-index:10;background:rgba(15,23,42,.95);backdrop-filter:blur(8px);padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
    .top{display:flex;gap:10px;align-items:center;justify-content:space-between;max-width:1200px;margin:0 auto}
    .title{font-size:15px;font-weight:700;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:55vw}
    .actions{display:flex;gap:8px;flex-shrink:0}
    a,button{appearance:none;border:none;border-radius:12px;padding:10px 12px;font-size:14px;font-weight:700;text-decoration:none;cursor:pointer}
    .primary{background:var(--accent);color:#fff}.secondary{background:#e2e8f0;color:#0f172a}
    main{height:calc(100vh - 62px)}
    iframe{width:100%;height:100%;border:none;background:#334155}
    .empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);padding:24px;text-align:center}
  </style>
</head>
<body>
<header>
  <div class="top">
    <div class="title" id="title">Visor PDF</div>
    <div class="actions">
      <a class="secondary" href="./">Volver</a>
      <a class="primary" id="download" target="_blank" rel="noopener">Descargar PDF</a>
    </div>
  </div>
</header>
<main>
  <iframe id="frame" title="Visor PDF" allow="fullscreen"></iframe>
  <div class="empty" id="empty" hidden>No se ha encontrado el PDF.</div>
</main>
<script>
  const params=new URLSearchParams(location.search);
  const file=params.get('file')||'';
  const title=params.get('title')||'Visor PDF';
  document.getElementById('title').textContent=title;
  document.getElementById('download').href=file;
  const frame=document.getElementById('frame');
  const empty=document.getElementById('empty');
  if(file){
    const viewer='https://mozilla.github.io/pdf.js/web/viewer.html?file='+encodeURIComponent(file);
    frame.src=viewer;
  } else {
    frame.hidden=true;
    empty.hidden=false;
  }
</script>
</body>
</html>
