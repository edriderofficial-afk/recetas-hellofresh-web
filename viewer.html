<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#111827">
<title>Visor receta</title>
<style>
  :root{
    --bg:#0b1020; --panel:#111827; --line:rgba(255,255,255,.08); --text:#fff; --muted:#9aa4b2;
    --brand:#6d5efc; --brand-2:#8b7cff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:linear-gradient(180deg,#0b1020 0%, #0f172a 100%);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  body{display:grid;grid-template-rows:auto 1fr}
  header{position:sticky;top:0;z-index:5;background:rgba(11,16,32,.82);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
  .bar{max-width:1440px;margin:0 auto;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .titlebox{min-width:0}
  .eyebrow{font-size:.75rem;text-transform:uppercase;letter-spacing:.12em;color:#a5b4fc;font-weight:900}
  .title{margin-top:4px;font-size:1rem;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:min(64vw,840px);letter-spacing:-.02em}
  .actions{display:flex;gap:8px;flex-shrink:0}
  a{appearance:none;text-decoration:none;border-radius:16px;padding:11px 14px;font-weight:900;cursor:pointer}
  .ghost{background:rgba(255,255,255,.08);color:#fff}.soft{background:#e5e7eb;color:#111827}.brand{background:linear-gradient(135deg,var(--brand),var(--brand-2));color:#fff}
  .wrap{padding:12px;height:100%}
  .frame{height:100%;border-radius:24px;overflow:hidden;background:#0f172a;box-shadow:0 24px 48px rgba(0,0,0,.35);border:1px solid var(--line)}
  iframe{width:100%;height:100%;border:none;background:#1f2937}
  .empty{display:none;height:100%;align-items:center;justify-content:center;text-align:center;color:var(--muted);padding:24px}
  @media (max-width:760px){
    .bar{flex-direction:column;align-items:flex-start}
    .title{max-width:100%}
    .actions{display:grid;grid-template-columns:repeat(3,1fr);width:100%}
    a{text-align:center}
  }
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="titlebox">
      <div class="eyebrow">Modo lectura</div>
      <div class="title" id="title">Receta</div>
    </div>
    <div class="actions">
      <a class="ghost" href="./">← Volver</a>
      <a class="soft" id="openOut" target="_blank" rel="noopener">Abrir fuera</a>
      <a class="brand" id="download" target="_blank" rel="noopener">Descargar</a>
    </div>
  </div>
</header>
<main class="wrap">
  <div class="frame">
    <iframe id="frame" title="Visor PDF" loading="eager"></iframe>
    <div id="empty" class="empty">No se ha podido abrir el PDF. Usa “Abrir fuera” o “Descargar”.</div>
  </div>
</main>
<script>
  const params=new URLSearchParams(location.search);
  const file=params.get('file')||'';
  const title=params.get('title')||'Receta';
  document.getElementById('title').textContent=title;
  document.getElementById('frame').src=file;
  document.getElementById('openOut').href=file;
  document.getElementById('download').href=file;
  document.getElementById('frame').addEventListener('error',()=>{
    document.getElementById('empty').style.display='flex';
  });
</script>
</body>
</html>
