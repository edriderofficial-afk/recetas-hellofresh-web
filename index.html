<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <meta name="description" content="Recetario visual privado para móvil y tablet">
  <title>Recetas en Casa</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <style>
    :root{
      --bg:#f6f7fb;
      --surface:#ffffff;
      --surface-2:#f2f4f8;
      --text:#111827;
      --muted:#667085;
      --line:#e7eaf0;
      --brand:#6d5efc;
      --brand-2:#8b7cff;
      --brand-soft:#efeefe;
      --shadow:0 12px 32px rgba(17,24,39,.08);
      --radius:24px;
      --max:1320px;
      --header-h:74px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;padding:0;background:linear-gradient(180deg,#f8f9fc 0%,#f3f5f9 100%);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;overscroll-behavior-y:none}
    body{padding-bottom:92px;overflow-x:hidden}
    button,input,select{font:inherit}
    a{text-decoration:none;color:inherit}
    img{display:block;max-width:100%}
    .shell{max-width:var(--max);margin:0 auto;padding:0 14px}
    .topbar{position:sticky;top:0;z-index:40;background:rgba(246,247,251,.82);backdrop-filter:blur(16px);border-bottom:1px solid rgba(231,234,240,.9)}
    .topbar-inner{height:var(--header-h);display:flex;align-items:center;gap:12px}
    .brand{display:flex;align-items:center;gap:12px;min-width:0;flex:1}
    .logo{width:42px;height:42px;border-radius:16px;background:linear-gradient(135deg,var(--brand),var(--brand-2));display:grid;place-items:center;color:#fff;font-size:20px;box-shadow:0 10px 24px rgba(109,94,252,.28)}
    .brandtext{min-width:0}
    .brandtext h1{margin:0;font-size:1rem;line-height:1.1;letter-spacing:-.02em}
    .brandtext p{margin:3px 0 0;font-size:.83rem;color:var(--muted)}
    .install{display:none;border:none;background:#111827;color:#fff;border-radius:16px;padding:11px 14px;font-weight:800;cursor:pointer;white-space:nowrap}
    .summary{padding:14px 0 10px}
    .summary-grid{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
    .intro{min-width:0}
    .eyebrow{font-size:.75rem;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--brand)}
    .intro h2{margin:4px 0 0;font-size:clamp(1.35rem,4vw,2rem);line-height:1.02;letter-spacing:-.04em}
    .stats{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .stat{background:rgba(255,255,255,.88);border:1px solid var(--line);box-shadow:var(--shadow);padding:10px 12px;border-radius:18px;min-width:92px}
    .stat strong{display:block;font-size:1rem}
    .stat span{font-size:.76rem;color:var(--muted)}
    .toolbar{display:grid;grid-template-columns:minmax(0,1fr) 148px 148px auto auto;gap:10px;padding:8px 0 8px}
    .control,.btn,.iconbtn{height:50px;border-radius:18px;border:1px solid var(--line);background:rgba(255,255,255,.95);box-shadow:0 4px 14px rgba(17,24,39,.04)}
    .control{padding:0 14px;outline:none}
    .control:focus{border-color:#c9c7ff;box-shadow:0 0 0 4px rgba(109,94,252,.12)}
    .btn{padding:0 16px;border:none;font-weight:800;cursor:pointer}
    .btn-primary{background:#111827;color:#fff}
    .btn-soft{background:var(--brand-soft);color:#4c41ba}
    .chips{display:flex;gap:8px;overflow:auto;padding:6px 0 14px;scrollbar-width:none}
    .chips::-webkit-scrollbar{display:none}
    .chip{white-space:nowrap;border:none;border-radius:999px;background:rgba(255,255,255,.92);border:1px solid var(--line);padding:11px 14px;font-weight:800;color:#475467;cursor:pointer;box-shadow:0 4px 14px rgba(17,24,39,.03)}
    .chip.active{background:#111827;color:#fff;border-color:#111827}
    .section-head{display:flex;align-items:end;justify-content:space-between;gap:12px;padding:6px 0 12px}
    .section-head h3{margin:0;font-size:1rem;letter-spacing:-.02em}
    .section-head p{margin:4px 0 0;color:var(--muted);font-size:.88rem}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;padding-bottom:14px}
    .card{background:rgba(255,255,255,.96);border:1px solid rgba(231,234,240,.95);border-radius:28px;overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:transform .18s ease, box-shadow .18s ease}
    .card:hover{transform:translateY(-3px);box-shadow:0 16px 34px rgba(17,24,39,.12)}
    .media{position:relative;aspect-ratio:1/1;overflow:hidden;background:#e9edf3}
    .media img{width:100%;height:100%;object-fit:cover}
    .media::after{content:"";position:absolute;inset:auto 0 0 0;height:45%;background:linear-gradient(to top, rgba(17,24,39,.34), transparent)}
    .fav{position:absolute;top:12px;right:12px;width:40px;height:40px;border:none;border-radius:999px;background:rgba(255,255,255,.92);display:grid;place-items:center;font-size:18px;box-shadow:0 8px 18px rgba(17,24,39,.12);cursor:pointer}
    .tag{position:absolute;left:12px;bottom:12px;background:rgba(17,24,39,.74);color:#fff;border:1px solid rgba(255,255,255,.14);padding:8px 12px;border-radius:999px;font-size:.76rem;font-weight:800;backdrop-filter:blur(10px)}
    .body{padding:14px 14px 16px}
    .title{font-size:1rem;font-weight:900;line-height:1.15;letter-spacing:-.03em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.3em}
    .sub{margin-top:6px;color:var(--muted);font-size:.88rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.5em}
    .pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .pill{background:var(--surface-2);border:1px solid var(--line);padding:8px 10px;border-radius:999px;font-size:.77rem;font-weight:800;color:#475467}
    .empty{padding:38px 18px;background:rgba(255,255,255,.95);border:1px dashed #d8deea;border-radius:28px;text-align:center;color:var(--muted);box-shadow:var(--shadow)}
    .empty strong{display:block;color:var(--text);margin-bottom:6px}
    .bottomnav{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);z-index:45;background:rgba(17,24,39,.88);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);border-radius:24px;display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:8px;box-shadow:0 22px 40px rgba(2,6,23,.24);width:min(calc(100% - 28px), 560px)}
    .navbtn{border:none;background:transparent;color:#cbd5e1;padding:12px 10px;border-radius:18px;font-weight:800;cursor:pointer}
    .navbtn.active{background:#fff;color:#111827}
    dialog{border:none;padding:0;background:transparent;position:fixed;inset:0;max-width:none;max-height:none;width:100vw;height:100vh;display:grid;place-items:center}
    dialog::backdrop{background:rgba(2,6,23,.55);backdrop-filter:blur(10px)}
    .sheet{width:min(920px,calc(100vw - 24px));max-height:min(88vh,860px);overflow:hidden;background:rgba(255,255,255,.99);border:1px solid rgba(231,234,240,.9);border-radius:30px;box-shadow:0 32px 64px rgba(2,6,23,.22);touch-action:manipulation}
    .sheet-head{position:sticky;top:0;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);padding:14px;display:flex;justify-content:space-between;align-items:center;gap:12px;z-index:2}
    .sheet-head button{border:none;background:#111827;color:#fff;width:42px;height:42px;border-radius:14px;cursor:pointer;font-size:18px}
    .detail{display:grid;grid-template-columns:minmax(0,1.08fr) minmax(300px,.92fr);gap:18px;padding:14px;overflow:auto;max-height:calc(88vh - 74px);overscroll-behavior:contain;-webkit-overflow-scrolling:touch;touch-action:pan-y}
    .detail-media{border-radius:24px;overflow:hidden;background:#e9edf3;aspect-ratio:1/1;position:relative}
    .detail-media img{width:100%;height:100%;object-fit:cover}
    .detail-side{display:flex;flex-direction:column;gap:14px}
    .kicker{font-size:.75rem;font-weight:900;text-transform:uppercase;letter-spacing:.12em;color:var(--brand)}
    .dtitle{font-size:clamp(1.5rem,3vw,2.1rem);line-height:1.02;letter-spacing:-.05em;font-weight:900}
    .dsub{color:var(--muted);font-size:.97rem;line-height:1.45}
    .meta{display:flex;gap:8px;flex-wrap:wrap}
    .meta span{background:var(--surface-2);border:1px solid var(--line);padding:10px 12px;border-radius:999px;font-size:.84rem;font-weight:800}
    .stack{display:grid;gap:10px}
    .action{display:flex;align-items:center;justify-content:center;height:52px;border:none;border-radius:18px;font-weight:900;cursor:pointer}
    .a-primary{background:linear-gradient(135deg,var(--brand),var(--brand-2));color:#fff;box-shadow:0 14px 30px rgba(109,94,252,.24)}
    .a-dark{background:#111827;color:#fff}
    .a-soft{background:var(--surface-2);color:#111827;border:1px solid var(--line)}
    .smallnote{font-size:.82rem;color:var(--muted)}
    @media (min-width:760px){
      .grid{grid-template-columns:repeat(3,minmax(0,1fr))}
    }
    @media (min-width:1100px){
      .grid{grid-template-columns:repeat(4,minmax(0,1fr))}
    }
    @media (max-width:900px){
      .summary-grid{grid-template-columns:1fr}
      .stats{justify-content:flex-start}
      .detail{grid-template-columns:1fr;gap:14px}
    }
    @media (max-width:720px){
      :root{--header-h:68px}
      .brandtext p{display:none}
      .summary{padding:10px 0 4px}
      .summary-grid{gap:8px}
      .stats{display:grid;grid-template-columns:repeat(3,1fr);width:100%}
      .stat{min-width:0;padding:9px 10px;border-radius:16px}
      .toolbar{grid-template-columns:1fr 1fr;gap:9px}
      .toolbar .search{grid-column:1/-1}
      .toolbar .btn{grid-column:span 1}
      .grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
      .card{border-radius:24px}
      .body{padding:12px}
      .title{font-size:.95rem}
      .sub{font-size:.84rem;min-height:2.3em}
      .sheet{width:calc(100vw - 12px);max-height:calc(100vh - 12px);border-radius:24px}
      .sheet-head{padding:12px}
    }
    @media (max-width:480px){
      .shell{padding:0 12px}
      .logo{width:38px;height:38px;border-radius:14px}
      .intro h2{font-size:1.18rem}
      .stats{gap:6px}
      .stat strong{font-size:.92rem}
      .stat span{font-size:.72rem}
      .toolbar{grid-template-columns:1fr}
      .toolbar>*{grid-column:auto !important}
      .grid{gap:10px}
      .pills{gap:6px}
      .pill{padding:7px 9px;font-size:.74rem}
      .bottomnav{bottom:10px;width:calc(100% - 18px)}
      body{padding-bottom:88px}
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="shell topbar-inner">
      <div class="brand">
        <div class="logo">🍽️</div>
        <div class="brandtext">
          <h1>Recetas en Casa</h1>
          <p>Tu recetario privado</p>
        </div>
      </div>
      <button id="installBtn" class="install">Instalar</button>
    </div>
  </header>

  <main class="shell">
    <section class="summary">
      <div class="summary-grid">
        <div class="intro">
          <div class="eyebrow">Colección</div>
          <h2>Elige una receta y cocina en un toque</h2>
        </div>
        <div class="stats">
          <div class="stat"><strong id="statRecipes">0</strong><span>Recetas</span></div>
          <div class="stat"><strong id="statFavorites">0</strong><span>Favoritas</span></div>
          <div class="stat"><strong id="statFilters">0</strong><span>Filtros</span></div>
        </div>
      </div>
    </section>

    <section class="toolbar">
      <input class="control search" id="q" type="search" placeholder="Buscar receta, ingrediente o tipo">
      <select class="control" id="category"><option value="">Tipo</option></select>
      <select class="control" id="protein"><option value="">Proteína</option></select>
      <button class="btn btn-soft" id="favToggle">Solo favoritas</button>
      <button class="btn btn-primary" id="clearBtn">Limpiar</button>
    </section>

    <div class="chips" id="quickChips"></div>

    <section class="section-head">
      <div>
        <h3 id="sectionTitle">Todas las recetas</h3>
        <p id="sectionMeta">596 recetas listas para abrir</p>
      </div>
    </section>

    <section id="grid" class="grid"></section>
    <section id="empty" class="empty" hidden>
      <strong>No hay resultados</strong>
      <div>Prueba otra búsqueda o quita algún filtro.</div>
    </section>
  </main>

  <nav class="bottomnav">
    <button class="navbtn active" data-mode="home">Inicio</button>
    <button class="navbtn" data-mode="browse">Explorar</button>
    <button class="navbtn" data-mode="favorites">Favoritas</button>
  </nav>

  <dialog id="detailModal">
    <div class="sheet">
      <div class="sheet-head">
        <div style="font-weight:900;letter-spacing:-.02em">Receta</div>
        <button id="closeDetail" aria-label="Cerrar">✕</button>
      </div>
      <div class="detail">
        <div class="detail-media"><img id="dimg" alt=""></div>
        <div class="detail-side">
          <div>
            <div class="kicker">Receta</div>
            <div class="dtitle" id="dtitle"></div>
            <div class="dsub" id="dsub"></div>
          </div>
          <div class="meta">
            <span id="dcat">Receta</span>
            <span id="dpro">Otra</span>
          </div>
          <div class="stack">
            <button class="action a-primary" id="openPdf" type="button">Abrir receta</button>
            <a class="action a-soft" id="downloadPdf" href="#" download>Descargar</a>
          </div>
        </div>
      </div>
    </div>
  </dialog>

  <script>
    const VERSION='20260411-premium-v2';
    let deferredPrompt=null;
    const state={recipes:[], q:'', category:'', protein:'', mode:'all', quick:'', favorites:new Set(JSON.parse(localStorage.getItem('hf_favs')||'[]'))};
    const els={
      q:document.getElementById('q'),
      category:document.getElementById('category'),
      protein:document.getElementById('protein'),
      grid:document.getElementById('grid'),
      empty:document.getElementById('empty'),
      quickChips:document.getElementById('quickChips'),
      clearBtn:document.getElementById('clearBtn'),
      favToggle:document.getElementById('favToggle'),
      statRecipes:document.getElementById('statRecipes'),
      statFavorites:document.getElementById('statFavorites'),
      statFilters:document.getElementById('statFilters'),
      sectionTitle:document.getElementById('sectionTitle'),
      sectionMeta:document.getElementById('sectionMeta'),
      detailModal:document.getElementById('detailModal'),
      closeDetail:document.getElementById('closeDetail'),
      dimg:document.getElementById('dimg'),
      dtitle:document.getElementById('dtitle'),
      dsub:document.getElementById('dsub'),
      dcat:document.getElementById('dcat'),
      dpro:document.getElementById('dpro'),
      openPdf:document.getElementById('openPdf'),
      downloadPdf:document.getElementById('downloadPdf'),
      installBtn:document.getElementById('installBtn')
    };
    const navButtons=[...document.querySelectorAll('.navbtn')];
    const quickDefs=[
      {key:'pollo', label:'Pollo'},
      {key:'pasta', label:'Pasta'},
      {key:'vegetariana', label:'Vegetariano'},
      {key:'arroz', label:'Arroz'},
      {key:'curry', label:'Curry'},
      {key:'horno', label:'Horno'}
    ];
    function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
    function saveFavs(){localStorage.setItem('hf_favs', JSON.stringify([...state.favorites]));}
    function toggleFav(id){ state.favorites.has(id)?state.favorites.delete(id):state.favorites.add(id); saveFavs(); render();}
    function fillSelect(el,items){ items.forEach(v=>{const o=document.createElement('option'); o.value=v; o.textContent=v; el.appendChild(o);});}
    function activeCount(){ return [state.q,state.category,state.protein,state.quick,state.mode==='favorites'].filter(Boolean).length; }
    function titleForSection(){
      if(state.mode==='favorites') return 'Tus favoritas';
      if(state.q) return 'Resultados';
      if(state.quick) return quickDefs.find(x=>x.key===state.quick)?.label || 'Explorar';
      return 'Todas las recetas';
    }
    function getRows(){
      let rows=[...state.recipes];
      if(state.mode==='favorites') rows=rows.filter(r=>state.favorites.has(r.id));
      if(state.q) rows=rows.filter(r=> (r.search_text || `${r.title} ${r.category||''} ${r.protein||''}`).toLowerCase().includes(state.q));
      if(state.category) rows=rows.filter(r=>r.category===state.category);
      if(state.protein) rows=rows.filter(r=>r.protein===state.protein);
      if(state.quick){
        const q=state.quick.toLowerCase();
        rows=rows.filter(r=>`${r.title} ${r.search_text||''} ${r.category||''} ${r.protein||''}`.toLowerCase().includes(q));
      }
      return rows;
    }
    function renderQuickChips(){
      els.quickChips.innerHTML='';
      quickDefs.forEach(item=>{
        const b=document.createElement('button');
        b.className='chip'+(state.quick===item.key?' active':'');
        b.textContent=item.label;
        b.onclick=()=>{state.quick=state.quick===item.key?'':item.key; renderQuickChips(); render();};
        els.quickChips.appendChild(b);
      });
    }
    function render(){
      const rows=getRows();
      els.grid.innerHTML='';
      els.empty.hidden=rows.length!==0;
      els.sectionTitle.textContent=titleForSection();
      els.sectionMeta.textContent = rows.length===state.recipes.length ? `${rows.length} recetas listas para abrir` : `${rows.length} resultados`;
      els.statRecipes.textContent=state.recipes.length;
      els.statFavorites.textContent=state.favorites.size;
      els.statFilters.textContent=activeCount();
      els.favToggle.textContent=state.mode==='favorites'?'Ver todas':'Solo favoritas';
      navButtons.forEach(b=>b.classList.toggle('active', b.dataset.mode===state.mode || (b.dataset.mode==='home' && state.mode==='all' && !state.quick && !state.q && !state.category && !state.protein)));

      rows.forEach(r=>{
        const fav=state.favorites.has(r.id);
        const card=document.createElement('article');
        card.className='card';
        card.innerHTML=`<div class="media">
          <img src="${r.cover_image}" alt="${esc(r.title)}" loading="lazy">
          <button class="fav" aria-label="Favorita">${fav?'❤️':'🤍'}</button>
          <div class="tag">${esc(r.protein||r.category||'Receta')}</div>
        </div>
        <div class="body">
          <div class="title">${esc(r.title)}</div>
          <div class="sub">${esc(r.card_subtitle || 'Receta')}</div>
          <div class="pills">
            <span class="pill">${esc(r.category||'Receta')}</span>
            <span class="pill">${esc(r.protein||'Otra')}</span>
          </div>
        </div>`;
        card.querySelector('.fav').onclick=(e)=>{e.stopPropagation(); toggleFav(r.id);};
        card.onclick=()=>openDetail(r);
        els.grid.appendChild(card);
      });
    }
    async function openPdfNative(url,title){
      const originalText = els.openPdf.textContent;
      els.openPdf.textContent = 'Abriendo…';
      els.openPdf.disabled = true;
      try{
        const res = await fetch(url, {mode:'cors'});
        if(!res.ok) throw new Error('No se pudo abrir el PDF');
        const blob = await res.blob();
        const pdfBlob = blob.type === 'application/pdf' ? blob : new Blob([await blob.arrayBuffer()], {type:'application/pdf'});
        const blobUrl = URL.createObjectURL(pdfBlob);
        const w = window.open(blobUrl, '_blank');
        if(!w){ window.location.href = blobUrl; }
        setTimeout(()=>URL.revokeObjectURL(blobUrl), 60000);
      }catch(err){
        window.open(url,'_blank');
      }finally{
        els.openPdf.textContent = originalText;
        els.openPdf.disabled = false;
      }
    }
    function openDetail(r){
      els.dimg.src=r.cover_image; els.dimg.alt=r.title; els.dtitle.textContent=r.title;
      els.dsub.textContent=r.card_subtitle || 'Receta';
      els.dcat.textContent=r.category || 'Receta'; els.dpro.textContent=r.protein || 'Otra';
      els.openPdf.onclick=(e)=>{e.preventDefault(); openPdfNative(r.pdf_url, r.title);};
      els.downloadPdf.href=r.pdf_url;
      els.downloadPdf.setAttribute('download', r.pdf_filename || (r.title + '.pdf'));
      document.body.style.overflow='hidden'; els.detailModal.showModal();
    }
    function clearFilters(){state.q='';state.category='';state.protein='';state.quick='';state.mode='all';els.q.value='';els.category.value='';els.protein.value='';renderQuickChips();render();}
    fetch('recipes.json?v='+VERSION,{cache:'no-store'})
      .then(r=>r.json())
      .then(data=>{
        state.recipes=data;
        fillSelect(els.category,[...new Set(data.map(x=>x.category).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'es')));
        fillSelect(els.protein,[...new Set(data.map(x=>x.protein).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'es')));
        renderQuickChips(); render();
      });
    els.q.addEventListener('input',e=>{state.q=e.target.value.trim().toLowerCase();render();});
    els.category.addEventListener('change',e=>{state.category=e.target.value;render();});
    els.protein.addEventListener('change',e=>{state.protein=e.target.value;render();});
    els.favToggle.addEventListener('click',()=>{state.mode=state.mode==='favorites'?'all':'favorites';render();});
    els.clearBtn.addEventListener('click',clearFilters);
    els.closeDetail.addEventListener('click',()=>{els.detailModal.close(); document.body.style.overflow='';});
    navButtons.forEach(btn=>btn.addEventListener('click',()=>{
      if(btn.dataset.mode==='favorites'){state.mode='favorites'; render();}
      else if(btn.dataset.mode==='browse'){state.mode='all'; window.scrollTo({top:document.querySelector('.toolbar').offsetTop-80,behavior:'smooth'}); render();}
      else {state.mode='all'; state.quick=''; state.q=''; state.category=''; state.protein=''; els.q.value=''; els.category.value=''; els.protein.value=''; renderQuickChips(); render(); window.scrollTo({top:0,behavior:'smooth'});}
    }));
    window.addEventListener('beforeinstallprompt', e=>{ e.preventDefault(); deferredPrompt=e; els.installBtn.style.display='inline-flex';});
    els.installBtn.addEventListener('click', async()=>{ if(!deferredPrompt) return; deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; els.installBtn.style.display='none';});
    window.addEventListener('appinstalled', ()=>{els.installBtn.style.display='none';});
    els.detailModal.addEventListener('close',()=>{document.body.style.overflow='';});
    window.addEventListener('keydown',e=>{if(e.key==='Escape' && els.detailModal.open){ els.detailModal.close(); document.body.style.overflow=''; }});
  </script>
</body>
</html>
