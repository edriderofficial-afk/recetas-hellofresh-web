<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>Recetas HelloFresh</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root{--bg:#f8fafc;--card:#fff;--text:#0f172a;--muted:#64748b;--accent:#16a34a;--border:#e2e8f0}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1100px;margin:0 auto;padding:16px}
    header{position:sticky;top:0;background:rgba(248,250,252,.92);backdrop-filter:blur(8px);z-index:10;border-bottom:1px solid var(--border)}
    h1{font-size:22px;margin:0 0 4px}.sub{color:var(--muted);font-size:14px}
    .toolbar{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px;padding:12px 16px 16px}
    input,select,button{border:1px solid var(--border);border-radius:14px;padding:12px 14px;font-size:16px;background:#fff}
    button{cursor:pointer;background:var(--text);color:#fff;border:none}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;padding:16px 0 32px}
    .card{background:var(--card);border-radius:22px;overflow:hidden;box-shadow:0 10px 30px rgba(2,6,23,.08);cursor:pointer;transition:.18s transform,.18s box-shadow}
    .card:hover{transform:translateY(-2px);box-shadow:0 16px 34px rgba(2,6,23,.12)}
    .img{aspect-ratio:1/1;object-fit:cover;width:100%;background:#e5e7eb}
    .body{padding:14px}
    .title{font-weight:700;line-height:1.25;font-size:16px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:40px}
    .meta{color:var(--muted);font-size:13px;margin-top:6px}
    .fav{position:absolute;top:10px;right:10px;background:rgba(255,255,255,.92);border:none;border-radius:999px;padding:10px 12px;color:#111827}
    .cardwrap{position:relative}
    dialog{border:none;border-radius:28px;padding:0;max-width:720px;width:min(96vw,720px)}
    dialog::backdrop{background:rgba(15,23,42,.72)}
    .detail img{width:100%;aspect-ratio:16/11;object-fit:cover}
    .detail-body{padding:18px}
    .chips{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 16px}
    .chip{padding:8px 10px;border-radius:999px;background:#f1f5f9;color:#334155;font-size:13px}
    .actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    .actions a,.actions button{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;border-radius:14px;padding:14px;font-weight:700}
    .primary{background:#0f172a;color:#fff}.secondary{background:#e2e8f0;color:#0f172a}.green{background:#16a34a;color:#fff}
    .empty{padding:28px 0;color:var(--muted);text-align:center}
    @media (max-width:720px){.toolbar{grid-template-columns:1fr;}.actions{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header>
  <div class="wrap" style="padding-top:16px">
    <h1>Recetas HelloFresh</h1>
    <div class="sub">Tu recetario visual compartido</div>
    <div class="toolbar">
      <input id="q" placeholder="Buscar receta">
      <select id="category"><option value="">Todas las categorías</option></select>
      <select id="protein"><option value="">Todas las proteínas</option></select>
      <button id="onlyFav">Solo favoritas</button>
    </div>
  </div>
</header>
<main class="wrap">
  <div id="count" class="sub" style="padding-top:14px"></div>
  <section id="grid" class="grid"></section>
  <div id="empty" class="empty" hidden>No hay recetas con esos filtros.</div>
</main>
<dialog id="modal">
  <div class="detail">
    <img id="dimg" alt="">
    <div class="detail-body">
      <h2 id="dtitle" style="margin:0 0 6px"></h2>
      <div id="dsub" class="sub"></div>
      <div class="chips">
        <div class="chip" id="dcat"></div>
        <div class="chip" id="dpro"></div>
      </div>
      <div class="actions">
        <a id="pdfBtn" class="primary" target="_blank" rel="noopener">Ver PDF</a>
        <a id="recipeBtn" class="secondary" target="_blank" rel="noopener">Ver web</a>
        <button id="favBtn" class="green">Guardar favorita</button>
      </div>
      <div style="margin-top:12px"><button class="secondary" style="width:100%" onclick="modal.close()">Cerrar</button></div>
    </div>
  </div>
</dialog>
<script>
const state={recipes:[], favorites:new Set(JSON.parse(localStorage.getItem('hf_favorites')||'[]')), onlyFav:false, q:'', category:'', protein:''};
const grid=document.getElementById('grid'), count=document.getElementById('count'), empty=document.getElementById('empty');
const q=document.getElementById('q'), category=document.getElementById('category'), protein=document.getElementById('protein'), onlyFav=document.getElementById('onlyFav');
const modal=document.getElementById('modal');
const els={img:dimg,title:dtitle,sub:dsub,cat:dcat,pro:dpro,pdf:pdfBtn,recipe:recipeBtn,fav:favBtn};

fetch('recipes.json').then(r=>r.json()).then(data=>{
  state.recipes=data;
  fillSelect(category, [...new Set(data.map(x=>x.category).filter(Boolean))].sort());
  fillSelect(protein, [...new Set(data.map(x=>x.protein).filter(Boolean))].sort());
  render();
});
function fillSelect(sel, items){ items.forEach(v=>{ const o=document.createElement('option'); o.value=v; o.textContent=v; sel.appendChild(o); });}
function saveFav(){ localStorage.setItem('hf_favorites', JSON.stringify([...state.favorites])); }
function filtered(){
  return state.recipes.filter(r=>{
    if(state.onlyFav && !state.favorites.has(r.id)) return false;
    if(state.category && r.category!==state.category) return false;
    if(state.protein && r.protein!==state.protein) return false;
    if(state.q && !(r.search_text||'').toLowerCase().includes(state.q)) return false;
    return true;
  });
}
function render(){
  const rows=filtered();
  count.textContent=`${rows.length} recetas`;
  grid.innerHTML='';
  empty.hidden=rows.length!==0;
  rows.forEach(r=>{
    const fav=state.favorites.has(r.id);
    const card=document.createElement('article');
    card.className='card';
    card.innerHTML=`<div class="cardwrap">
      <button class="fav" aria-label="favorita">${fav?'❤️':'🤍'}</button>
      <img class="img" src="${r.cover_image}" alt="${escapeHtml(r.title)}" loading="lazy">
    </div>
    <div class="body">
      <div class="title">${escapeHtml(r.title)}</div>
      <div class="meta">${escapeHtml(r.card_subtitle||'')}</div>
    </div>`;
    card.querySelector('.fav').onclick=(e)=>{e.stopPropagation(); toggleFav(r.id);};
    card.onclick=()=>openDetail(r);
    grid.appendChild(card);
  });
}
function toggleFav(id){ state.favorites.has(id)?state.favorites.delete(id):state.favorites.add(id); saveFav(); render(); }
function openDetail(r){
  els.img.src=r.cover_image; els.img.alt=r.title; els.title.textContent=r.title; els.sub.textContent=r.card_subtitle||'';
  els.cat.textContent=r.category||'Receta'; els.pro.textContent=r.protein||'Otra';
  els.pdf.href=r.pdf_url; els.recipe.href=r.recipe_url;
  els.fav.textContent=state.favorites.has(r.id)?'Quitar favorita':'Guardar favorita';
  els.fav.onclick=()=>{toggleFav(r.id); openDetail(r);};
  modal.showModal();
}
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g,m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));}
q.addEventListener('input',e=>{state.q=e.target.value.trim().toLowerCase(); render();});
category.addEventListener('change',e=>{state.category=e.target.value; render();});
protein.addEventListener('change',e=>{state.protein=e.target.value; render();});
onlyFav.addEventListener('click',()=>{state.onlyFav=!state.onlyFav; onlyFav.textContent=state.onlyFav?'Todas':'Solo favoritas'; render();});
</script>
</body></html>
